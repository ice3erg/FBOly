services:
  backend:
    build:
      context: ./backend
    container_name: ozon-fbo-backend
    environment:
      OZON_API_BASE_URL: https://api-seller.ozon.ru
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: ozon-fbo-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
